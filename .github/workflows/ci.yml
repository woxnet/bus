name: hardware-independent-ci

on:
  push:
  pull_request:

jobs:
  structure-and-java:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['8', '17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
      - name: Verify repository structure
        run: |
          test -z "$(git ls-files -- lib/Tinkerforge.jar)"
          test -f java/bus/imu/ImuAllDataBuffer.java
          test -f lib-generated/imu-callback-bridge-v2.jar
          test -f src/getImuConfig.m
      - name: Compile and test bounded Java bridge
        shell: bash
        run: |
          mkdir -p build/java
          if [[ "${{ matrix.java-version }}" == "8" ]]; then
            FLAGS="-source 1.8 -target 1.8"
          else
            FLAGS="--release 8"
          fi
          javac $FLAGS -d build/java \
            java/test/com/tinkerforge/BrickIMUV2.java \
            java/bus/imu/ImuAllDataBuffer.java \
            java/test/bus/imu/ImuAllDataBufferTest.java
          java -ea -cp build/java bus.imu.ImuAllDataBufferTest

  official-tinkerforge-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download pinned official Tinkerforge API
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/tinkerforge-matlab.zip \
            https://download.tinkerforge.com/bindings/matlab/tinkerforge_matlab_bindings_2_0_33.zip
          echo "f1367928962ba4ab27b5046e26ade272e94a0e4a630ce9115c50e2b67a71bfb1  /tmp/tinkerforge-matlab.zip" | sha256sum --check
          unzip -p /tmp/tinkerforge-matlab.zip matlab/Tinkerforge.jar > /tmp/Tinkerforge.jar
      - name: Compile bridge against official API
        run: |
          mkdir -p build/official
          javac --release 8 -cp /tmp/Tinkerforge.jar \
            -d build/official java/bus/imu/ImuAllDataBuffer.java

  matlab-unit-tests:
    runs-on: ubuntu-latest
    env:
      MLM_LICENSE_TOKEN: ${{ secrets.MLM_LICENSE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Check MATLAB license token
        shell: bash
        run: |
          if [ -z "$MLM_LICENSE_TOKEN" ]; then
            echo "::error::Repository secret MLM_LICENSE_TOKEN is not configured."
            echo "::error::Add a MATLAB Batch Licensing Token in repository Actions secrets."
            exit 1
          fi
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: R2021b
      - name: Run MATLAB unit tests
        uses: matlab-actions/run-command@v3
        with:
          command: startup; results = runtests("tests"); disp(table(results)); assertSuccess(results)
